<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>L'Italia s'è Desta</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Italia s'è Desta">

  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">

  <!-- OneSignal Web SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(function (OneSignal) {
      OneSignal.init({
        appId: "527d2637-dd68-4c03-8299-5ccf4e469535",
      });
    });
  </script>
</head>

<body>

  <main class="home">

    <div class="striscia-top"><i></i><i></i><i></i></div>

    <div class="contenuto">
      <img class="logo" src="icon-512.png" alt="Logo L'Italia s'è Desta">

      <h1>L'Italia <span>s'è Desta</span></h1>
      <p class="sottotitolo">Bollettino Informativo</p>

      <a class="bottone-principale" href="https://www.litaliasedesta.it">
        Leggi il giornale
      </a>

      <button class="bottone-secondario" id="btn-notifiche">
        Attiva le notifiche
      </button>

      <p class="stato-notifiche" id="stato-notifiche"></p>
    </div>

    <p class="footer">Movimento Stella Tricolore</p>
  </main>

  <!-- Banner "Installa l'app" -->
  <div class="install-banner" id="install-banner">
    <img src="icon-192.png" alt="Logo">
    <div class="testo">Installa "L'Italia s'è Desta" sulla schermata home</div>
    <button id="install-btn">Installa</button>
    <button class="chiudi" id="install-chiudi">✕</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
